
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dependency License Report for Third party libraries</title>
    <meta charset="utf-8">
    <style>
    @media print {
        .inventory {
            display: none;
        }

        .content {
            position: static !important;
        }
    }

    html, body, section {
      height: 100%;
    }

    body {
      font-family: sans-serif;
      line-height: 125%;
      margin: 0;
      background: #eee;
    }

    .header {
        /* #22aa44 */
        background: #ff5588;
        color: white;
        padding: 2em 1em 1em 1em;
    }

    .header h1 {
        font-size: 16pt;
        margin: 0.5em 0;
    }

    .header h2 {
        font-size: 10pt;
        margin: 0;
    }

    .container {
    }

    .inventory {
        background: #292e34;
        color: #ddd;
        padding: 0;
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        width: 20em;
        overflow: auto;
    }

    .inventory ul {
        margin: 0;
        padding: 0;
    }

    .inventory li {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .inventory li a {
        width: 100%;
        box-sizing: border-box;
        color: #ddd;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        padding: 15px 12px;
    }

    .inventory li a:hover {
        background: #383f45;
        color: white;
    }

    .license .name {
        flex-grow: 1;

    }

    .license .badge {
        background: #ff5588;
        padding: 10px 15px;
        border-radius: 20px;
        color: white;
    }

    .content {
        padding: 1rem;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 20em;
    }

    .dependency {
        background: white;
        padding: 1em;
        margin-bottom: 1em;
    }

    .dependency label {
        font-weight: bold;
    }

    .dependency-value {
    }
    </style>
</head>
<body>
<div class="container">
<div class='inventory'>
<div class='header'>
<h1>noise-filter 0.0.8</h1>
<h2>Dependency License Report</h2>
<h2 class='timestamp'><em>2025-07-15 16:10:39 UTC</em>.</h2></div>
<h3>Third party libraries</h3>
<ul>
</ul>
</div>
<div class='content'>
<h1>Third party libraries</h1>
</div>

</div>
</body>
</html>
